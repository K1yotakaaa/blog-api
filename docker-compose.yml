services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - blog_network

  web:
    build: .
    env_file:
      - settings/.env
    volumes:
      - ./settings/.env:/app/settings/.env:ro
      - sqlite_data:/app/data
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      redis:
        condition: service_healthy
    command: daphne -b 0.0.0.0 -p 8000 settings.asgi:application
    restart: unless-stopped
    networks:
      - blog_network

  celery_worker:
    build: .
    env_file:
      - settings/.env
    volumes:
      - ./settings/.env:/app/settings/.env:ro
      - sqlite_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A settings worker -l info
    restart: unless-stopped
    networks:
      - blog_network

  celery_beat:
    build: .
    env_file:
      - settings/.env
    volumes:
      - ./settings/.env:/app/settings/.env:ro
      - sqlite_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A settings beat -l info
    restart: unless-stopped
    networks:
      - blog_network

  flower:
    build: .
    env_file:
      - settings/.env
    volumes:
      - ./settings/.env:/app/settings/.env:ro
    ports:
      - '5555:5555'
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A settings flower
      --basic_auth=${BLOG_FLOWER_USER}:${BLOG_FLOWER_PASSWORD}
    restart: unless-stopped
    networks:
      - blog_network

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped
    networks:
      - blog_network

volumes:
  sqlite_data:
  static_volume:
  media_volume:

networks:
  blog_network:
    driver: bridge
